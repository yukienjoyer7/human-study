<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blind A/B Face Edit Evaluation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #20231f;
      --muted: #62685f;
      --line: #d9ddd1;
      --accent: #1f7a5a;
      --accent-weak: #e6f3ed;
      --warn: #a05a00;
      --warn-weak: #fff2d8;
      --bad: #a33a32;
      --shadow: 0 1px 2px rgba(20, 24, 18, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 242, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; }
    h1 { font-size: 20px; margin: 0; letter-spacing: 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 4px 9px; background: var(--panel); }
    .save-pill { color: #0d513a; background: var(--accent-weak); border-color: #b7dbc9; }
    .save-pill.saved { outline: 2px solid #b7dbc9; }
    main { padding: 18px 0 36px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .intro { padding: 14px 16px; margin-bottom: 14px; display: grid; gap: 12px; }
    .intro p { margin: 0; color: var(--muted); }
    .identity { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(220px, 2fr) auto; gap: 10px; align-items: end; }
    .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; color: var(--muted); }
    .field input { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px 11px; font: inherit; background: #fff; color: var(--ink); }
    .idbox { min-height: 42px; border: 1px solid var(--line); border-radius: 6px; padding: 10px 11px; background: #fafbf8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    button { font: inherit; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 6px; padding: 10px 12px; cursor: pointer; }
    button:hover { border-color: #9fa894; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .ghost { background: transparent; }
    .case-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 16px; border-bottom: 1px solid var(--line); }
    .case-title { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    h2 { font-size: 18px; margin: 0; }
    .attribute { color: var(--muted); font-size: 14px; }
    .image-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; padding: 16px; }
    figure { margin: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
    figure a { display: block; }
    .zoom-link { cursor: zoom-in; }
    img { display: block; width: 100%; aspect-ratio: 1 / 1; object-fit: cover; background: #eef0eb; }
    figcaption { display: flex; justify-content: center; align-items: center; min-height: 38px; font-weight: 700; }
    .zoom-dialog { width: min(94vw, 920px); padding: 0; border: 0; border-radius: 8px; background: #111; color: #fff; }
    .zoom-dialog::backdrop { background: rgba(0, 0, 0, .72); }
    .zoom-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 12px; }
    .zoom-head button { background: transparent; border-color: rgba(255, 255, 255, .5); color: #fff; }
    .zoom-dialog img { width: 100%; max-height: 80vh; aspect-ratio: auto; object-fit: contain; background: #111; }
    .questions { display: grid; gap: 12px; padding: 0 16px 16px; }
    .question { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(360px, 2fr); gap: 10px; align-items: center; }
    .q-label { font-weight: 700; }
    .choices { display: grid; grid-template-columns: repeat(4, minmax(72px, 1fr)); gap: 8px; }
    .choice[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-weak); color: #0d513a; font-weight: 700; }
    .notes { padding: 0 16px 16px; }
    textarea { width: 100%; min-height: 70px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 10px 11px; font: inherit; }
    .actions { display: flex; justify-content: space-between; gap: 10px; padding: 14px 16px; border-top: 1px solid var(--line); }
    .actions div { display: flex; gap: 10px; flex-wrap: wrap; }
    .progress-panel { margin-top: 14px; padding: 14px 16px; }
    .progress-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 10px; color: var(--muted); }
    .bar { height: 9px; border-radius: 999px; background: #e5e8df; overflow: hidden; }
    .bar span { display: block; height: 100%; width: 0; background: var(--accent); }
    .case-nav { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); gap: 6px; }
    .case-nav button { padding: 7px 0; font-size: 12px; }
    .case-nav .done { border-color: var(--accent); background: var(--accent-weak); }
    .case-nav .current { outline: 2px solid var(--accent); outline-offset: 1px; }
    .review { margin-top: 14px; padding: 14px 16px; display: grid; gap: 10px; }
    .review.complete { border-color: #b7dbc9; background: #fbfffd; }
    .review h3 { margin: 0; font-size: 16px; }
    .status { min-height: 22px; color: var(--muted); }
    .status.ready { color: #0d513a; font-weight: 700; }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }
    .missing { margin: 0; padding: 10px 12px; border-radius: 6px; background: var(--warn-weak); color: var(--warn); display: none; }
    .hidden-frame { display: none; width: 0; height: 0; border: 0; }

    @media (max-width: 760px) {
      .wrap { width: min(100% - 20px, 1180px); }
      .topbar, .case-head, .actions { align-items: stretch; flex-direction: column; }
      .topbar { gap: 10px; padding: 10px 0; }
      h1 { font-size: 18px; }
      h2 { font-size: 17px; }
      main { padding: 10px 0 28px; }
      .intro, .case-head, .progress-panel, .review { padding: 12px; }
      .identity { grid-template-columns: 1fr; }
      .image-grid { grid-template-columns: 1fr; gap: 10px; padding: 10px; }
      .question { grid-template-columns: 1fr; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .choice, .actions button { min-height: 48px; }
      .questions { padding: 0 10px 12px; }
      .notes { padding: 0 10px 12px; }
      figcaption { min-height: 34px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>Blind A/B Face Edit Evaluation</h1>
      <div class="meta">
        <span class="pill" id="progressPill">0/84 selesai</span>
        <span class="pill">A/B acak</span>
        <span class="pill save-pill" id="saveStatus">Draft saved locally</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="panel intro" aria-label="Informasi annotator">
      <p>Nilai hanya berdasarkan visual. Jangan menebak metode atau model. Gunakan nickname atau inisial saja.</p>
      <div class="identity">
        <div class="field">
          <label>Annotator ID</label>
          <div class="idbox" id="annotatorId"></div>
        </div>
        <div class="field">
          <label for="nickname">Nickname / inisial</label>
          <input id="nickname" autocomplete="name" maxlength="60" placeholder="contoh: dion">
        </div>
        <button type="button" class="ghost" id="newIdButton">ID baru</button>
      </div>
    </section>

    <section class="panel" aria-live="polite">
      <div class="case-head">
        <div class="case-title">
          <h2 id="caseId"></h2>
          <span class="attribute" id="attribute"></span>
        </div>
        <span class="pill" id="caseCounter"></span>
      </div>

      <div class="image-grid" id="imageGrid"></div>
      <div class="questions" id="questions"></div>
      <div class="notes">
        <textarea id="caseNotes" maxlength="400" placeholder="Catatan opsional"></textarea>
      </div>
      <div class="actions">
        <div>
          <button type="button" id="prevButton">Sebelumnya</button>
          <button type="button" id="nextButton">Berikutnya</button>
        </div>
        <div>
          <button type="button" id="downloadButton">Download CSV</button>
          <button type="button" class="primary" id="submitButton">Submit</button>
        </div>
      </div>
    </section>

    <section class="panel progress-panel" aria-label="Progress">
      <div class="progress-row">
        <span id="progressText">0 dari 84 selesai</span>
        <span id="currentHint"></span>
      </div>
      <div class="bar"><span id="progressBar"></span></div>
      <div class="case-nav" id="caseNav"></div>
    </section>

    <section class="panel review" aria-label="Review dan submit">
      <h3>Review</h3>
      <p class="missing" id="missingBox"></p>
      <p class="status" id="statusText"></p>
    </section>
  </main>

  <dialog class="zoom-dialog" id="zoomDialog" aria-label="Preview gambar">
    <div class="zoom-head">
      <strong id="zoomTitle"></strong>
      <button type="button" id="zoomClose">Tutup</button>
    </div>
    <img id="zoomImage" alt="">
  </dialog>

  <iframe class="hidden-frame" name="sheetSink" title="hidden submit target"></iframe>

urce.png","A":"assets/H6-075/A.png","B":"assets/H6-075/B.png"},{"study_id":"H6-076","attribute":"double chin","source":"assets/H6-076/source.png","A":"assets/H6-076/A.png","B":"assets/H6-076/B.png"},{"study_id":"H6-077","attribute":"double chin","source":"assets/H6-077/source.png","A":"assets/H6-077/A.png","B":"assets/H6-077/B.png"},{"study_id":"H6-078","attribute":"double chin","source":"assets/H6-078/source.png","A":"assets/H6-078/A.png","B":"assets/H6-078/B.png"},{"study_id":"H6-079","attribute":"smiling","source":"assets/H6-079/source.png","A":"assets/H6-079/A.png","B":"assets/H6-079/B.png"},{"study_id":"H6-080","attribute":"double chin","source":"assets/H6-080/source.png","A":"assets/H6-080/A.png","B":"assets/H6-080/B.png"},{"study_id":"H6-081","attribute":"smiling","source":"assets/H6-081/source.png","A":"assets/H6-081/A.png","B":"assets/H6-081/B.png"},{"study_id":"H6-082","attribute":"smiling","source":"assets/H6-082/source.png","A":"assets/H6-082/A.png","B":"assets/H6-082/B.png"},{"study_id":"H6-083","attribute":"smiling","source":"assets/H6-083/source.png","A":"assets/H6-083/A.png","B":"assets/H6-083/B.png"},{"study_id":"H6-084","attribute":"smiling","source":"assets/H6-084/source.png","A":"assets/H6-084/A.png","B":"assets/H6-084/B.png"}];
    const QUESTIONS = [
      ["identity_preference", "Identitas paling mirip source?"],
      ["target_preference", "Atribut target paling jelas?"],
      ["overall_preference", "Overall paling baik?"]
    ];
    const VALUES = ["A", "B", "Tie", "Unclear"];
    const STORE = "blind_ab_face_edit_v1";
    const params = new URLSearchParams(location.search);

    const state = {
      annotatorId: pickAnnotatorId(),
      nickname: localStorage.getItem(`${STORE}:nickname`) || "",
      current: Number(localStorage.getItem(`${STORE}:current`) || 0),
      answers: {}
    };
    state.answers = readJson(`${STORE}:answers:${state.annotatorId}`, {});
    state.current = Math.min(Math.max(state.current, 0), CASES.length - 1);

    const $ = (id) => document.getElementById(id);
    let saveTimer;

    function pickAnnotatorId() {
      const fromUrl = params.get("annotator");
      if (fromUrl && /^[A-Za-z0-9_-]{2,32}$/.test(fromUrl)) {
        localStorage.setItem(`${STORE}:annotator_id`, fromUrl);
        return fromUrl;
      }
      const saved = localStorage.getItem(`${STORE}:annotator_id`);
      if (saved) return saved;
      const made = makeId();
      localStorage.setItem(`${STORE}:annotator_id`, made);
      return made;
    }

    function makeId() {
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const bytes = new Uint8Array(7);
      crypto.getRandomValues(bytes);
      return "R" + Array.from(bytes, (b) => alphabet[b % alphabet.length]).join("");
    }

    function readJson(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; }
      catch { return fallback; }
    }

    function save() {
      localStorage.setItem(`${STORE}:annotator_id`, state.annotatorId);
      localStorage.setItem(`${STORE}:nickname`, state.nickname);
      localStorage.setItem(`${STORE}:current`, String(state.current));
      localStorage.setItem(`${STORE}:answers:${state.annotatorId}`, JSON.stringify(state.answers));
      const status = $("saveStatus");
      if (status) {
        status.textContent = "Draft saved";
        status.classList.add("saved");
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => status.classList.remove("saved"), 700);
      }
    }

    function answerFor(studyId) {
      state.answers[studyId] ||= {};
      return state.answers[studyId];
    }

    function complete(item) {
      const ans = state.answers[item.study_id] || {};
      return QUESTIONS.every(([key]) => VALUES.includes(ans[key]));
    }

    function completeCount() {
      return CASES.filter(complete).length;
    }

    function missingCases() {
      return CASES.filter((item) => !complete(item)).map((item) => item.study_id);
    }

    function render() {
      const item = CASES[state.current];
      const ans = state.answers[item.study_id] || {};
      const count = completeCount();
      const pct = Math.round((count / CASES.length) * 100);

      $("annotatorId").textContent = state.annotatorId;
      $("nickname").value = state.nickname;
      $("caseId").textContent = `Target: ${item.attribute}`;
      $("attribute").textContent = "";
      $("caseCounter").textContent = `${state.current + 1} / ${CASES.length}`;
      $("progressPill").textContent = `${count}/${CASES.length} selesai`;
      $("progressText").textContent = `${count} dari ${CASES.length} selesai`;
      $("currentHint").textContent = `${pct}%`;
      $("progressBar").style.width = `${pct}%`;
      $("prevButton").disabled = state.current === 0;
      $("nextButton").disabled = state.current === CASES.length - 1;
      $("submitButton").disabled = count !== CASES.length || !state.nickname.trim();
      $("caseNotes").value = ans.notes || "";

      $("imageGrid").innerHTML = [
        ["Source", item.source],
        ["A", item.A],
        ["B", item.B]
      ].map(([label, src]) => `
        <figure>
          <a class="zoom-link" href="${src}" target="_blank" rel="noopener" data-zoom="${label}">
            <img src="${src}" alt="${label} image" loading="eager">
          </a>
          <figcaption>${label}</figcaption>
        </figure>`).join("");

      $("questions").innerHTML = QUESTIONS.map(([key, label]) => `
        <div class="question">
          <div class="q-label">${label}</div>
          <div class="choices" role="group" aria-label="${label}">
            ${VALUES.map((value) => `
              <button type="button" class="choice" data-choice data-key="${key}" data-value="${value}" aria-pressed="${ans[key] === value}">${value}</button>
            `).join("")}
          </div>
        </div>`).join("");

      $("caseNav").innerHTML = CASES.map((navItem, index) => `
        <button type="button" data-case-index="${index}" class="${complete(navItem) ? "done" : ""} ${index === state.current ? "current" : ""}">
          ${String(index + 1).padStart(2, "0")}
        </button>`).join("");

      renderReview();
    }

    function renderReview() {
      const missing = missingCases();
      const box = $("missingBox");
      const status = $("statusText");
      $("statusText").closest(".review").classList.toggle("complete", !missing.length && !!state.nickname.trim());
      status.className = "status";
      if (missing.length) {
        box.style.display = "block";
        box.textContent = `Belum lengkap: ${missing.slice(0, 18).join(", ")}${missing.length > 18 ? " ..." : ""}`;
        status.textContent = `${CASES.length - missing.length}/${CASES.length} complete`;
      } else if (!state.nickname.trim()) {
        box.style.display = "block";
        box.textContent = "Isi nickname atau inisial sebelum submit.";
        status.className = "status ready";
        status.textContent = `${CASES.length}/${CASES.length} complete. Add nickname to submit.`;
      } else {
        box.style.display = "none";
        box.textContent = "";
        status.className = "status ready";
        status.textContent = `${CASES.length}/${CASES.length} complete. Ready to submit.`;
      }
    }

    function responseRows() {
      const submittedAt = new Date().toISOString();
      return CASES.map((item) => {
        const ans = state.answers[item.study_id] || {};
        const unclear = QUESTIONS.some(([key]) => ans[key] === "Unclear");
        return {
          annotator_id: state.annotatorId,
          study_id: item.study_id,
          identity_preference: ans.identity_preference || "",
          target_preference: ans.target_preference || "",
          overall_preference: ans.overall_preference || "",
          unclear: unclear ? "true" : "false",
          notes: ans.notes || "",
          nickname: state.nickname.trim(),
          submitted_at: submittedAt
        };
      });
    }

    function csvEscape(value) {
      return `"${String(value ?? "").replace(/"/g, '""')}"`;
    }

    function downloadCsv() {
      const header = ["annotator_id", "study_id", "identity_preference", "target_preference", "overall_preference", "unclear", "notes", "nickname", "submitted_at"];
      const lines = [header.join(",")].concat(responseRows().map((row) => header.map((key) => csvEscape(row[key])).join(",")));
      const blob = new Blob([lines.join("\n") + "\n"], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `annotation_responses_${state.annotatorId}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function submitToSheet() {
      const missing = missingCases();
      const status = $("statusText");
      status.className = "status";
      if (missing.length) {
        status.className = "status warn";
        status.textContent = "Lengkapi semua pilihan sebelum submit.";
        return;
      }
      if (!state.nickname.trim()) {
        status.className = "status warn";
        status.textContent = "Isi nickname atau inisial sebelum submit.";
        return;
      }
      downloadCsv();
      if (!GOOGLE_SCRIPT_URL.trim()) {
        status.className = "status warn";
        status.textContent = "CSV sudah didownload. Submit online belum aktif.";
        return;
      }

      const payload = {
        annotator_id: state.annotatorId,
        nickname: state.nickname.trim(),
        rows: responseRows()
      };
      const form = document.createElement("form");
      form.method = "POST";
      form.action = GOOGLE_SCRIPT_URL.trim();
      form.target = "sheetSink";
      form.style.display = "none";
      const input = document.createElement("input");
      input.name = "payload";
      input.value = JSON.stringify(payload);
      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();
      form.remove();
      status.textContent = "Submit terkirim. CSV backup juga sudah didownload.";
    }

    function openZoom(link) {
      $("zoomTitle").textContent = link.dataset.zoom;
      $("zoomImage").src = link.href;
      $("zoomImage").alt = `${link.dataset.zoom} image`;
      $("zoomDialog").showModal();
    }

    document.addEventListener("click", (event) => {
      const zoom = event.target.closest("[data-zoom]");
      if (zoom) {
        event.preventDefault();
        openZoom(zoom);
        return;
      }
      const choice = event.target.closest("[data-choice]");
      if (choice) {
        const item = CASES[state.current];
        answerFor(item.study_id)[choice.dataset.key] = choice.dataset.value;
        save();
        render();
        return;
      }
      const nav = event.target.closest("[data-case-index]");
      if (nav) {
        state.current = Number(nav.dataset.caseIndex);
        save();
        render();
        scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    $("nickname").addEventListener("input", (event) => {
      state.nickname = event.target.value.slice(0, 60);
      save();
      renderReview();
      $("submitButton").disabled = completeCount() !== CASES.length || !state.nickname.trim();
    });
    $("caseNotes").addEventListener("input", (event) => {
      answerFor(CASES[state.current].study_id).notes = event.target.value.slice(0, 400);
      save();
    });
    $("prevButton").addEventListener("click", () => { state.current = Math.max(0, state.current - 1); save(); render(); });
    $("nextButton").addEventListener("click", () => { state.current = Math.min(CASES.length - 1, state.current + 1); save(); render(); });
    $("downloadButton").addEventListener("click", downloadCsv);
    $("submitButton").addEventListener("click", submitToSheet);
    $("zoomClose").addEventListener("click", () => $("zoomDialog").close());
    $("zoomDialog").addEventListener("click", (event) => {
      if (event.target === $("zoomDialog")) $("zoomDialog").close();
    });
    $("newIdButton").addEventListener("click", () => {
      if (Object.keys(state.answers).length && !confirm("Mulai draft dengan ID baru di browser ini? Draft ID lama tetap tersimpan di browser.")) return;
      state.annotatorId = makeId();
      state.answers = readJson(`${STORE}:answers:${state.annotatorId}`, {});
      state.current = 0;
      save();
      render();
    });

    render();
  </script>
</body>
